name: CI

# Consolidated from 3 previous workflows (ci + typecheck + deploy-gate)
# after the 2000-min/month Actions budget was exhausted. Typecheck +
# lint + test run on every push; Lighthouse + accessibility audits
# only on pull requests to save ~20 min/run.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check:
    name: Typecheck, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint (strict)
        run: npx eslint . --max-warnings 0

      - name: Unit Tests
        run: npm run test

  lighthouse:
    name: Lighthouse Audit
    # PR-only: master pushes go straight to Vercel which runs its own build.
    # Running Lighthouse on every master push was costing ~10 min/run.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: check
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.js
          uploadArtifacts: true
          temporaryPublicStorage: true

  accessibility:
    name: Accessibility Audit
    # PR-only for the same cost reason.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Run axe accessibility tests
        run: npx playwright test tests/accessibility.spec.ts --reporter=list || true
