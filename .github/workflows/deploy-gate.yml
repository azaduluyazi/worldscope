name: Deploy Gate
on:
  push:
    branches: [main, master]
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint (strict)
        run: npx eslint . --max-warnings 0
      - name: Unit Tests
        run: npx vitest run
