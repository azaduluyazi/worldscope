  <circle cx="256" cy="256" r="238" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.12"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="url(#gold)" stroke-width="0.6" opacity="0.08" stroke-dasharray="6 3"/>
  <!-- Greek key corner decorations -->
  <g stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.12">
    <polyline points="35,35 65,35 65,50 50,50 50,65 35,65 35,35"/>
    <polyline points="477,35 447,35 447,50 462,50 462,65 477,65 477,35"/>
    <polyline points="35,477 65,477 65,462 50,462 50,447 35,447 35,477"/>
    <polyline points="477,477 447,477 447,462 462,462 462,447 477,447 477,477"/>
  </g>
