  <text x="256" y="450" text-anchor="middle" fill="url(#gold)" font-family="'Georgia', 'Times New Roman', serif" font-size="54" font-weight="bold" letter-spacing="18" filter="url(#textGlow)">TROIA</text>
  <!-- Subtitle -->
  <text x="256" y="484" text-anchor="middle" fill="url(#gold)" font-family="'Georgia', serif" font-size="15" letter-spacing="10" opacity="0.4">MEDIA</text>
